<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Extractor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        body {
            padding: 2rem;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 700px;
        }
        #checkboxSection {
            display: none;
        }
        #notification {
            display: none;
        }
        .file-label {
            font-size: 0.9rem;
            color: #6c757d;
            margin-left: 0.5rem;
        }
        .field-selection-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="container">
    <h2 class="mb-4">JSON Field Extractor</h2>

    <!-- File Selection and Upload -->
    <div class="card mb-3">
        <div class="card-body">
            <div class="d-flex align-items-center flex-wrap gap-2">
                <button class="btn btn-secondary" id="selectFileBtn" type="button">Select File</button>
                <span class="file-label" id="fileNameDisplay">No file selected</span>
                <input type="file" id="fileInput" accept=".json" style="display:none">
                <button class="btn btn-primary" id="uploadBtn" type="button" disabled>Upload</button>
            </div>
        </div>
    </div>

    <!-- Checkboxes -->
    <div class="card mb-3" id="checkboxSection">
        <div class="card-body">
            <h6 class="card-title">Select fields to extract:</h6>
            <div id="checkboxContainer" class="d-flex flex-wrap gap-3"></div>
        </div>
    </div>

    <!-- Extract Buttons -->
    <div class="card mb-3">
        <div class="card-body">
            <h6 class="card-title">Extract options:</h6>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="optLowercaseFirstLetter" checked>
                <label class="form-check-label" for="optLowercaseFirstLetter">
                    Lowercase first character of each extracted value
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="optTrimWhitespace" checked>
                <label class="form-check-label" for="optTrimWhitespace">
                    Trim whitespace from both ends of each extracted value
                </label>
            </div>
            <div class="d-flex align-items-center gap-2 mt-1">
                <div class="form-check mb-0">
                    <input class="form-check-input" type="checkbox" id="optStripCharsEnabled" checked>
                    <label class="form-check-label" for="optStripCharsEnabled">
                        Strip characters from both ends of each extracted value:
                    </label>
                </div>
                <input type="text" class="form-control form-control-sm w-auto" id="optStripChars" value=",;:.!?-" style="min-width: 120px;">
            </div>
        </div>
    </div>

    <div class="d-flex gap-2">
        <button class="btn btn-success" id="extractFileBtn" type="button" disabled>Extract to File</button>
        <button class="btn btn-info" id="extractClipboardBtn" type="button" disabled>Extract to Clipboard</button>
    </div>

    <!-- Notification -->
    <div class="alert alert-success mt-3" id="notification" role="alert">
        Copied to clipboard!
    </div>
</div>

<script>
    const selectFileBtn = document.getElementById('selectFileBtn');
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const uploadBtn = document.getElementById('uploadBtn');
    const checkboxSection = document.getElementById('checkboxSection');
    const checkboxContainer = document.getElementById('checkboxContainer');
    const extractFileBtn = document.getElementById('extractFileBtn');
    const extractClipboardBtn = document.getElementById('extractClipboardBtn');
    const notification = document.getElementById('notification');
    const optLowercaseFirstLetter = document.getElementById('optLowercaseFirstLetter');
    const optTrimWhitespace = document.getElementById('optTrimWhitespace');
    const optStripCharsEnabled = document.getElementById('optStripCharsEnabled');
    const optStripChars = document.getElementById('optStripChars');

    let fileUploaded = false;

    selectFileBtn.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            fileNameDisplay.textContent = fileInput.files[0].name;
            uploadBtn.disabled = false;
        } else {
            fileNameDisplay.textContent = 'No file selected';
            uploadBtn.disabled = true;
        }
    });

    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        try {
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';
            const response = await fetch('./upload', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error('Upload failed: ' + response.statusText);
            }

            const fieldNames = await response.json();
            fileUploaded = true;
            renderCheckboxes(fieldNames);
            updateExtractButtons();
        } catch (err) {
            alert('Error uploading file: ' + err.message);
        } finally {
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Upload';
        }
    });

    function renderCheckboxes(fieldNames) {
        checkboxContainer.innerHTML = '';
        fieldNames.forEach(field => {
            const row = document.createElement('div');
            row.className = 'field-selection-row';
            row.dataset.field = field;

            const input = document.createElement('input');
            input.className = 'form-check-input flex-shrink-0';
            input.type = 'checkbox';
            input.id = 'cb_' + field;
            input.value = field;
            input.addEventListener('change', () => syncColumnSelectors(field));

            const label = document.createElement('label');
            label.className = 'form-check-label flex-grow-1';
            label.htmlFor = 'cb_' + field;
            label.textContent = field;

            const colLabel = document.createElement('span');
            colLabel.className = 'text-muted small column-label';
            colLabel.textContent = 'Column:';

            const select = document.createElement('select');
            select.className = 'form-select form-select-sm w-auto';
            select.setAttribute('aria-label', 'Column position for ' + field);
            select.disabled = true;
            select.hidden = true;
            colLabel.hidden = true;
            select.addEventListener('change', () => syncColumnSelectors(field));

            row.appendChild(input);
            row.appendChild(label);
            row.appendChild(colLabel);
            row.appendChild(select);
            checkboxContainer.appendChild(row);
        });

        checkboxSection.style.display = 'block';
        syncColumnSelectors();
    }

    function getFieldRows() {
        return Array.from(checkboxContainer.querySelectorAll('.field-selection-row'));
    }

    function getSelectedFieldRows() {
        return getFieldRows().filter(row => row.querySelector('input[type="checkbox"]').checked);
    }

    function getSelectedFields() {
        return getSelectedFieldRows().map(row => row.dataset.field);
    }

    function buildColumnOptions(select, selectedCount, selectedOrder) {
        select.innerHTML = '';
        for (let i = 1; i <= selectedCount; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            if (i === selectedOrder) {
                option.selected = true;
            }
            select.appendChild(option);
        }
    }

    function syncColumnSelectors(prioritizedField = null) {
        const selectedRows = getSelectedFieldRows();
        const selectedCount = selectedRows.length;
        const assignmentOrder = prioritizedField
            ? [
                ...selectedRows.filter(row => row.dataset.field === prioritizedField),
                ...selectedRows.filter(row => row.dataset.field !== prioritizedField)
            ]
            : selectedRows;
        const assignedOrders = new Map();
        const usedOrders = new Set();

        assignmentOrder.forEach(row => {
            const select = row.querySelector('select');
            const requestedOrder = Number.parseInt(select.value, 10);
            if (Number.isInteger(requestedOrder)
                && requestedOrder >= 1
                && requestedOrder <= selectedCount
                && !usedOrders.has(requestedOrder)) {
                assignedOrders.set(row.dataset.field, requestedOrder);
                usedOrders.add(requestedOrder);
            }
        });

        let nextOrder = 1;
        selectedRows.forEach(row => {
            if (assignedOrders.has(row.dataset.field)) {
                return;
            }
            while (usedOrders.has(nextOrder)) {
                nextOrder++;
            }
            assignedOrders.set(row.dataset.field, nextOrder);
            usedOrders.add(nextOrder);
        });

        getFieldRows().forEach(row => {
            const checkbox = row.querySelector('input[type="checkbox"]');
            const select = row.querySelector('select');
            const columnLabel = row.querySelector('.column-label');

            if (!checkbox.checked || selectedCount === 0) {
                select.disabled = true;
                select.hidden = true;
                columnLabel.hidden = true;
                select.innerHTML = '';
                return;
            }

            const selectedOrder = assignedOrders.get(row.dataset.field);
            buildColumnOptions(select, selectedCount, selectedOrder);
            select.disabled = false;
            select.hidden = false;
            columnLabel.hidden = false;
        });

        updateExtractButtons();
    }

    function getFieldColumnEntries() {
        return getSelectedFieldRows()
            .map(row => ({
                field: row.dataset.field,
                columnIndex: Number.parseInt(row.querySelector('select').value, 10)
            }))
            .sort((left, right) => left.columnIndex - right.columnIndex);
    }

    function createExtractionRequestPayload() {
        const fieldColumns = getFieldColumnEntries();
        return {
            fields: fieldColumns.map(entry => entry.field),
            fieldColumns,
            ...getExtractionOptions()
        };
    }

    function updateExtractButtons() {
        const anyChecked = getSelectedFields().length > 0;
        const enabled = anyChecked && fileUploaded;
        extractFileBtn.disabled = !enabled;
        extractClipboardBtn.disabled = !enabled;
    }

    function getExtractionOptions() {
        return {
            lowercaseFirstLetter: optLowercaseFirstLetter.checked,
            trimWhitespace: optTrimWhitespace.checked,
            stripCharsEnabled: optStripCharsEnabled.checked,
            stripChars: optStripChars.value
        };
    }

    extractFileBtn.addEventListener('click', async () => {
        const fieldColumns = getFieldColumnEntries();
        if (fieldColumns.length === 0 || !fileUploaded) return;

        try {
            const response = await fetch('./extract?download=true', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(createExtractionRequestPayload())
            });

            if (!response.ok) throw new Error('Extraction failed');

            const disposition = response.headers.get('Content-Disposition');
            let filename = 'extracted.txt';
            if (disposition) {
                const match = disposition.match(/filename="([^"]+)"/);
                if (match) filename = match[1];
            }

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (err) {
            alert('Error extracting data: ' + err.message);
        }
    });

    extractClipboardBtn.addEventListener('click', async () => {
        const fieldColumns = getFieldColumnEntries();
        if (fieldColumns.length === 0 || !fileUploaded) return;

        try {
            const response = await fetch('./extract', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(createExtractionRequestPayload())
            });

            if (!response.ok) throw new Error('Extraction failed');

            const text = await response.text();
            await navigator.clipboard.writeText(text);

            notification.style.display = 'block';
            setTimeout(() => { notification.style.display = 'none'; }, 3000);
        } catch (err) {
            alert('Error copying to clipboard: ' + err.message);
        }
    });
</script>
</body>
</html>
